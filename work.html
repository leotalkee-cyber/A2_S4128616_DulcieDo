<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DC Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Pangolin:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link href="work.css" rel="stylesheet" />
    <link href="contact.css" rel="stylesheet" />
  </head>

  <body>
    <!-- NAVBAR -->
    <header class="navbar">
      <a class="logo-box" id="logo-box" href="index.html" aria-label="Back to home">
        <img src="img/logo.png" alt="Logo" />
      </a>

      <nav class="nav-info">
        <a class="active" href="work.html">Work</a>
        <a href="about.html">About</a>
        <a href="#" class="contact-trigger">Contact</a>
      </nav>

      <div class="nav-app">
        <a href="https://www.facebook.com/dulcie.do.497404/" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
          <img src="img/fb.png" alt="Facebook icon" />
        </a>
        <a href="https://www.instagram.com/dul.ciee__/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          <img src="img/ins.png" alt="Instagram icon" />
        </a>
      </div>

      <div class="mobile-menu" id="mobile-menu">
        <a href="index.html">Home</a>
        <a class="active" href="work.html">Work</a>
        <a href="about.html">About</a>
        <a href="#" class="contact-trigger">Contact</a>
      </div>
    </header>

    <!-- MAIN: WORK PAGE -->
    <main class="work-page">
      <!-- MEOMEO SECTION: MAIN-CAT IMG -->
      <section class="meomeo">
        <img class="main-cat" src="img/maincat.png" alt="Main cat" />
      </section>

      <!-- WORK GRID: 4 BOXES WITH HOVER EFFECTS-->
      <section class="work-grid">
        <!-- BOX-1: MERCH-->
        <article class="box box-1">
          <a class="box-link" href="lanyard.html" aria-label="Go to lanyard page">
            <img class="box-image" src="img/lanyard.png" alt="Lanyard work" />
            <h2 class="box-title"><span>MERCH</span></h2>
          </a>
        </article>

        <!-- BOX-2: 2D GRAPHIC -->
        <article class="box box-2">
          <a class="box-link" href="lan.html" aria-label="Go to 2D graphic page">
            <img
              class="box-image"
              src="img/Lan.jpg"
              alt="Lan work"
            />
            <h2 class="box-title"><span>2D GRAPHIC</span></h2>
          </a>
        </article>

        <!-- BOX-3: WEB DESIGN-->
        <article class="box box-3">
          <a class="box-link" href="diamond.html" aria-label="Go to web design page">
            <img class="box-image" src="img/diamond.png" alt="Diamond work" />
            <h2 class="box-title"><span>WEB DESIGN</span></h2>
          </a>
        </article>

        <!-- BOX-4: SHORT MOVIE-->
        <article class="box box-4">
          <a class="box-link" href="movie.html" aria-label="Go to short movie page">
            <img class="box-image" src="img/movie.png" alt="Movie work" />
            <h2 class="box-title"><span>SHORT MOVIE</span></h2>
          </a>
        </article>
      </section>
    </main>
    <!-- PAWN CURSOR-->
    <div class="custom-cursor" id="custom-cursor"></div>
    <!-- FOOTER -->
    <footer class="page-footer" aria-label="Page footer">
      <p class="footer-text">©2026 Dulcie Do. All rights reserved.</p>
    </footer>

    <!-- CONTACT POPUP-->
    <div class="contact-popup-overlay" id="contact-popup-overlay">
      <div class="contact-popup">
        <button class="popup-close" id="popup-close" type="button" aria-label="Close popup">&times;</button>
        <div class="popup-grid">
          <div class="popup-left">
            <h2 class="popup-title">CONTACT</h2>
            <p class="popup-email">Email: dung21505@gmail.com</p>
          </div>
          <div class="popup-right">
            <h2 class="popup-title">SOCIAL MEDIA</h2>
            <p class="popup-social">Facebook: Dulcie Do</p>
            <p class="popup-social">Instagram: dul.ciee__</p>
          </div>
        </div>
      </div>
    </div>

      <script src="contact.js"></script>
      <script src="work.js"></script>
  </body>
</html>
